services:
  ramose:
    build: ./ramose
    ports:
      - "8081:8081"

  grlc:
    build: ./grlc
    ports:
      - "8082:8082"
    environment:
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}

  basil:
    build: ./basil
    ports:
      - "8080:8080"

  # R4R binds a single SPARQL endpoint for the whole server, so it reaches
  # OpenCitations Meta only. GRAPH_IRI is blanked because R4R otherwise sends
  # default-graph-uri=http://dbpedia.org, its built-in default.
  r4r:
    build: ./r4r
    ports:
      - "8083:7777"
    environment:
      SPARQL_ENDPOINT: https://sparql.opencitations.net/meta
      RESOURCE_NAMESPACE: https://w3id.org/oc/meta/br/
      GRAPH_IRI: ""

  r4r-auth:
    build: ./r4r
    ports:
      - "8084:7777"
    environment:
      SPARQL_ENDPOINT: https://sparql.opencitations.net/meta
      RESOURCE_NAMESPACE: https://w3id.org/oc/meta/br/
      GRAPH_IRI: ""
      API_USERS: "demo:demo"

  crafts:
    build: ./crafts
    ports:
      - "8085:8888"

  rdfproxy:
    build: ./rdfproxy
    ports:
      - "8086:8086"

  # One-shot: registers the OpenCitations Meta API in the running BASIL server
  basil-init:
    image: python:3.13-alpine@sha256:420cd0bf0f3998275875e02ecd5808168cf0843cbb4d3c536432f729247b2acc
    user: root
    depends_on:
      - basil
    entrypoint: ["python", "/init/register.py"]
    environment:
      BASIL_BASE: http://basil:8080
    volumes:
      - ./basil/init:/init:ro
      - ./basil/state:/state
    restart: "no"
